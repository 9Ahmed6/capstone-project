# =====================================================================
# Action-Based Video Understanding System — central configuration
# Loaded by src.utils.config.load_settings() at startup.
# All paths are relative to the project root unless explicitly absolute.
# =====================================================================

project:
  name: "Action-Based Video Understanding"
  version: "0.1.0"
  random_seed: 42

paths:
  data_dir: "data"
  videos_dir: "data/videos"
  samples_dir: "data/samples"
  outputs_dir: "outputs"
  schema_file: "schemas/action_library.json"
  logs_dir: "outputs/logs"

# ---------- Week 2: video & audio ingestion ----------
video:
  allowed_extensions: [".mp4", ".mov", ".avi", ".mkv"]
  max_upload_mb: 500
  target_fps: 5              # frame sampling rate for downstream models
  max_duration_sec: 600      # reject anything over 10 minutes
  resize_width: 640          # 0 disables resizing

audio:
  sample_rate: 16000
  mono: true
  format: "wav"

# ---------- Week 3: schema matching ----------
schema_matching:
  embedding_model: "sentence-transformers/all-MiniLM-L6-v2"
  similarity_threshold: 0.55       # below this, draft a new schema
  top_k: 3
  device: "cpu"                    # "cuda" if available

# ---------- Week 4: visual feature extraction ----------
visual:
  detector: "yolov8n.pt"           # nano model is fine for CPU dev
  conf_threshold: 0.30
  iou_threshold: 0.45
  sample_every_n_frames: 6

# ---------- Week 5: pose extraction ----------
pose:
  model_complexity: 1              # 0=lite, 1=full, 2=heavy
  min_detection_confidence: 0.5
  min_tracking_confidence: 0.5
  enable_hands: true

# ---------- Week 6: multimodal fusion / inference ----------
fusion:
  primary_model: "Qwen/Qwen2.5-VL-7B-Instruct"
  fallback_model: "llava-hf/llava-1.5-7b-hf"
  use_fallback: true
  segment_min_duration_sec: 0.5
  segment_merge_gap_sec: 0.75
  confidence_threshold: 0.40

# ---------- Week 7: UI ----------
ui:
  page_title: "Action-Based Video Understanding"
  show_intermediate: true
  max_clip_preview_count: 5

# ---------- Week 8: export ----------
export:
  clip_format: "mp4"
  clip_codec: "libx264"
  clip_padding_sec: 0.25           # extra context around each segment

logging:
  level: "INFO"
  format: "%(asctime)s | %(levelname)s | %(name)s | %(message)s"
